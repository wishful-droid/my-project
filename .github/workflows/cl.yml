name: trigger-pipelines
on:
push:
branches: [ main ] # run only when code is pushed to main

jobs:
  runs-on: ubuntu-latest
  steps:
    - uses: actions/checkout@v2
    with:
      node-version: '20'
    - name: install-npm
      run: npm install
    - name: run-tests
      run: npm run test
      
name: trigger-pipelines

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v2

      - name: setup node
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: install dependencies
        run: npm install

      - name: run tests
        run: npm test



